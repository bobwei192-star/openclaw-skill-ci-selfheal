jenkins:
  url_env: "JENKINS_URL"
  user_env: "JENKINS_USER"
  token_env: "JENKINS_API_TOKEN"

gitlab:
  url: "https://devopsclaw-nginx:8441"
  token_env: "GITLAB_TOKEN"
  host_env: "GITLAB_HOST"

repair:
  max_retries: 5
  poll_interval_sec: 5
  build_timeout_min: 30

whitelist:
  repos: []
  branch_pattern: ".*"
  protected_branches: []
notify:
  dingtalk_webhook_env: "DINGTALK_WEBHOOK"
